services:
  - type: web
    name: riskpredictor-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FRONTEND_URL
        value: https://martinzapanaberrospi.github.io
